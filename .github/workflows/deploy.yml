name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      
      - name: Build with environment variables
        run: npm run build
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}

      - name: Deploy
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_KEY }}
          REMOTE_HOST: ${{ secrets.HOST }}
          REMOTE_USER: ${{ secrets.USER }}
          TARGET: /var/www/rnadw
          EXCLUDE: ".git, node_modules, .env.local"

      - name: Setup environment and restart PM2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          command_timeout: 10m
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

            cd /var/www/rnadw

            # Create .env.local with MongoDB connection
            echo "MONGODB_URI=${{ secrets.MONGODB_URI }}" > .env.local

            # Ensure uploads directory persists
            mkdir -p /var/www/rnadw/public/uploads

            # Install dependencies
            npm ci --prefer-offline

            # Restart the application
            pm2 restart rnadw || pm2 start npm --name rnadw -- start
