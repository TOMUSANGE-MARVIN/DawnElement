name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      
      - name: Build with environment variables
        run: npm run build
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          NEXT_PUBLIC_ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}

      - name: Deploy
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_KEY }}
          REMOTE_HOST: ${{ secrets.HOST }}
          REMOTE_USER: ${{ secrets.USER }}
          TARGET: /var/www/rnadw
          EXCLUDE: ".git, node_modules, .env.local"

      - name: Setup environment and restart PM2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          timeout: 60s
          command_timeout: 10m
          script_stop: false
          script: |
            set -e
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            [ -s "$HOME/.bashrc" ] && . "$HOME/.bashrc"
            export PATH="$HOME/.nvm/versions/node/$(ls $HOME/.nvm/versions/node/ 2>/dev/null | tail -1)/bin:$HOME/.local/bin:/usr/local/bin:$PATH"
            echo "=== Node/NPM ==="
            node -v && npm -v
            echo "=== Setting up project ==="
            cd /var/www/rnadw
            printf 'MONGODB_URI=%s\nADMIN_API_KEY=%s\nNEXT_PUBLIC_ADMIN_API_KEY=%s\n' "${{ secrets.MONGODB_URI }}" "${{ secrets.ADMIN_API_KEY }}" "${{ secrets.ADMIN_API_KEY }}" > .env.local
            mkdir -p /var/www/rnadw/public/uploads
            echo "=== Installing dependencies ==="
            npm ci --prefer-offline 2>&1
            echo "=== Clearing Next.js cache ==="
            rm -rf /var/www/rnadw/.next/cache
            echo "=== Malware cleanup ==="
            find /var/www/rnadw/public/uploads -type f ! -name "*.jpg" ! -name "*.jpeg" ! -name "*.png" ! -name "*.gif" ! -name "*.webp" ! -name "*.pdf" ! -name "*.doc" ! -name "*.docx" -delete 2>/dev/null || true
            find /var/www/rnadw/public/documents -type f ! -name "*.pdf" ! -name "*.doc" ! -name "*.docx" -delete 2>/dev/null || true
            echo "=== Restarting PM2 ==="
            npx pm2 delete rnadw 2>/dev/null || true
            npx pm2 start npm --name rnadw -- start 2>&1
            npx pm2 save
            echo "=== Done ==="
